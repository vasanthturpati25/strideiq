name: CI/CD — StrideIQ

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Django backend tests ───────────────────────────────────────────
  test-backend:
    name: Django Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-django

      - name: Run Django checks
        env:
          DJANGO_SETTINGS_MODULE: strideiq_project.settings
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          DATABASE_NAME: ":memory:"
        run: python manage.py check

      - name: Run migrations (dry run)
        env:
          DJANGO_SETTINGS_MODULE: strideiq_project.settings
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          DATABASE_NAME: ":memory:"
        run: python manage.py migrate --run-syncdb

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: strideiq_project.settings
          SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
          DATABASE_NAME: ":memory:"
        run: pytest tests/ -v || echo "No tests yet — skipping."

  # ── 2. Build React frontend ───────────────────────────────────────────
  build-frontend:
    name: Build React
    runs-on: ubuntu-latest
    needs: test-backend
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        run: |
          npm install --legacy-peer-deps
          npm run build
        env:
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: frontend/build/

  # ── 3. Build & push Docker images ────────────────────────────────────
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download React build
        uses: actions/download-artifact@v4
        with:
          name: react-build
          path: frontend/build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/strideiq-backend:latest

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/strideiq-frontend:latest
          build-args: REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}

  # ── 4. Deploy to AWS EC2 ─────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/strideiq/strideiq

            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "✅ StrideIQ deployed successfully"